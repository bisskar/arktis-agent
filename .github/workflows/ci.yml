name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Match the latest stable minor so govulncheck sees a stdlib that
          # has the most recent advisories applied. go.mod still pins
          # `go 1.22` as the minimum supported toolchain.
          go-version: 'stable'

      - name: Build (all platforms)
        run: make build-all

      - name: Test
        run: make test

      - name: Vet
        run: go vet ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Match the latest stable minor so govulncheck sees a stdlib that
          # has the most recent advisories applied. go.mod still pins
          # `go 1.22` as the minimum supported toolchain.
          go-version: 'stable'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      # Running gosec via `go install` rather than the securego/gosec
      # action keeps the no-fail behaviour consistent with what we see
      # locally (the action wrapper has a habit of exiting non-zero
      # despite `-no-fail`). Findings still go to GitHub code scanning
      # via the SARIF upload below.
      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sarif -out gosec.sarif -no-fail -exclude-dir=.github ./...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
