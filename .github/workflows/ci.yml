name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          # Match the latest stable minor so govulncheck sees a stdlib that
          # has the most recent advisories applied. go.mod still pins
          # `go 1.22` as the minimum supported toolchain.
          # check-latest forces a fresh resolution on every run so a stale
          # toolchain cache (e.g. setup-go cache hit on 1.26.2 after
          # GO-2026-4971 was published and 1.26.3 fixed it) cannot keep
          # CI red on a pre-existing stdlib advisory.
          go-version: 'stable'
          check-latest: true

      - name: Build (all platforms)
        run: make build-all

      - name: Test
        run: make test

      - name: Vet
        run: go vet ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          # See build-and-test job for why check-latest is set.
          go-version: 'stable'
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          # See build-and-test job for why check-latest is set.
          go-version: 'stable'
          check-latest: true

      # Running gosec via `go install` rather than the securego/gosec
      # action keeps the no-fail behaviour consistent with what we see
      # locally (the action wrapper has a habit of exiting non-zero
      # despite `-no-fail`). Findings still go to GitHub code scanning
      # via the SARIF upload below.
      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.0
          gosec -fmt sarif -out gosec.sarif -no-fail -exclude-dir=.github ./...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          sarif_file: gosec.sarif

  dependency-review:
    name: dependency-review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
