name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: arktis-agent-linux-amd64
          - goos: linux
            goarch: arm64
            binary: arktis-agent-linux-arm64
          - goos: windows
            goarch: amd64
            binary: arktis-agent-windows-amd64.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: 'stable'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags "-X main.Version=${VERSION} -s -w" \
            -o ${{ matrix.binary }} ./cmd/arktis-agent

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # cosign keyless OIDC
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          sha256sum \
            arktis-agent-linux-amd64 \
            arktis-agent-linux-arm64 \
            arktis-agent-windows-amd64.exe \
            > sha256sums.txt
          cat sha256sums.txt

      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Sign artifacts (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          for f in \
            arktis-agent-linux-amd64 \
            arktis-agent-linux-arm64 \
            arktis-agent-windows-amd64.exe \
            sha256sums.txt
          do
            cosign sign-blob \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              --bundle "${f}.cosign.bundle" \
              "${f}"
          done

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            arktis-agent-linux-amd64
            arktis-agent-linux-arm64
            arktis-agent-windows-amd64.exe
            sha256sums.txt
            arktis-agent-linux-amd64.sig
            arktis-agent-linux-amd64.crt
            arktis-agent-linux-amd64.cosign.bundle
            arktis-agent-linux-arm64.sig
            arktis-agent-linux-arm64.crt
            arktis-agent-linux-arm64.cosign.bundle
            arktis-agent-windows-amd64.exe.sig
            arktis-agent-windows-amd64.exe.crt
            arktis-agent-windows-amd64.exe.cosign.bundle
            sha256sums.txt.sig
            sha256sums.txt.crt
            sha256sums.txt.cosign.bundle
