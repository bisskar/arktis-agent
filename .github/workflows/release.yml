name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: sentinel-agent-linux-amd64
          - goos: linux
            goarch: arm64
            binary: sentinel-agent-linux-arm64
          - goos: windows
            goarch: amd64
            binary: sentinel-agent-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags "-X main.Version=${VERSION} -s -w" \
            -o ${{ matrix.binary }} ./cmd/sentinel-agent

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sentinel-agent-linux-amd64
            sentinel-agent-linux-arm64
            sentinel-agent-windows-amd64.exe
